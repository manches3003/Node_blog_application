name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: true

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies and build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-blog-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/node-blog-app:buildcache
          cache-to: type=inline

      - name: Setup minikube
        uses: manusa/actions-setup-minikube@v2.10.0
        with:
          minikube-version: latest
          kubernetes-version: v1.28.0

      - name: Deploy to minikube
        run: |
          minikube image pull ${{ secrets.DOCKERHUB_USERNAME }}/node-blog-app:latest
          kubectl create secret generic node-blog-secrets \
            --from-literal=DATABASE_URL="postgresql://postgres:KES92%40pk@postgres:5432/node_blog_db" \
            --from-literal=SECRET_KEY="dev-secret-key" \
            --dry-run=client -o yaml | kubectl apply -f -
          
      - name: Deploy Postgres
        run: |    
          kubectl apply -f k8s/postgres.yaml
      
      - name: Deploy application
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml || true
          
      - name: Wait for deployment
        run: |    
          kubectl rollout restart deployment node-blog-app
          kubectl rollout status deployment node-blog-app --timeout=120s || true
          echo "Deployment complete!"
          kubectl get pods
