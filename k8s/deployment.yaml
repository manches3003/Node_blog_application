apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-blog-app
  labels:
    app: node-blog-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-blog-app
  template:
    metadata:
      labels:
        app: node-blog-app
    spec:
      containers:
      - name: node-blog-app
        image: manches300/node-blog-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        envFrom:
        - secretRef:
            name: node-blog-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
